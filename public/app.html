<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareerOS — AI Career Operating System</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --accent:#58a6ff;--accent2:#3fb950;--warn:#d29922;--danger:#f85149;--purple:#bc8cff;
  --card-shadow:0 1px 3px rgba(0,0,0,.4);--radius:10px;
}
[data-theme="light"]{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#eaeef2;--border:#d0d7de;--text:#1f2328;--muted:#656d76;
  --accent:#0969da;--accent2:#1a7f37;--warn:#9a6700;--danger:#cf222e;--purple:#8250df;
  --card-shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
#app{display:flex;min-height:100vh}
/* Sidebar */
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:50;display:flex;flex-direction:column}
#sidebar .logo{padding:16px;font-size:17px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
#sidebar .logo span{color:var(--accent)}
#sidebar nav{flex:1;padding:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--muted);font-weight:500;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-size:14px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--text);box-shadow:inset 3px 0 0 var(--accent)}
.nav-item .ico{width:18px;text-align:center}
#sidebar .foot{padding:12px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
/* Main */
#main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-width:0}
#topbar{display:flex;align-items:center;gap:12px;padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}
#topbar h1{font-size:17px;flex:0 0 auto;margin-right:8px}
#searchwrap{position:relative;flex:1;max-width:420px}
#globalsearch{width:100%;padding:7px 12px 7px 32px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px}
#searchwrap::before{content:"🔍";position:absolute;left:9px;top:7px;font-size:12px;opacity:.6}
#searchresults{position:absolute;top:38px;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);max-height:380px;overflow-y:auto;display:none;z-index:100}
#searchresults .sr{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
#searchresults .sr:hover{background:var(--bg3)}
#searchresults .sr .t{font-weight:600;font-size:13px}
#searchresults .sr .s{font-size:12px;color:var(--muted)}
#content{padding:24px;flex:1;max-width:1200px;width:100%}
/* Components */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--card-shadow)}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.big{font-size:28px;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:13px;font-weight:500}
.btn:hover{border-color:var(--muted)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.success{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn.danger{color:var(--danger);border-color:var(--danger);background:transparent}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.ghost{background:transparent}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit;width:100%}
textarea{resize:vertical;min-height:70px}
label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin:10px 0 4px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--border)}
.badge.blue{color:var(--accent);border-color:var(--accent)}
.badge.green{color:var(--accent2);border-color:var(--accent2)}
.badge.yellow{color:var(--warn);border-color:var(--warn)}
.badge.red{color:var(--danger);border-color:var(--danger)}
.badge.purple{color:var(--purple);border-color:var(--purple)}
.muted{color:var(--muted)}.small{font-size:12px}.mt{margin-top:12px}.mb{margin-bottom:12px}
.progress{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.progress>div{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.progress.green>div{background:var(--accent2)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);padding:8px;border-bottom:1px solid var(--border)}
td{padding:9px 8px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
tr:hover td{background:var(--bg3)}
/* Kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kcol{min-width:210px;flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px}
.kcol h4{font-size:12px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}
.kcard{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer}
.kcard:hover{border-color:var(--accent)}
.kcard .co{font-weight:600;font-size:13px}
.kcard .ro{font-size:12px;color:var(--muted)}
/* Modal */
#modalbg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:200;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px}
#modalbg.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:640px;padding:22px;box-shadow:0 16px 48px rgba(0,0,0,.5)}
#modal h2{font-size:16px;margin-bottom:8px}
/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;display:none;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.4)}
/* Chat */
.chat{display:flex;flex-direction:column;height:calc(100vh - 210px);min-height:400px}
.chatlog{flex:1;overflow-y:auto;padding:6px 2px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;padding:10px 14px;border-radius:12px;white-space:pre-wrap;font-size:13.5px}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.ai{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:4px}
/* Bars chart */
.bars{display:flex;align-items:flex-end;gap:6px;height:110px}
.bars .bar{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px;position:relative}
.bars .bar span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted)}
.bars .bar b{position:absolute;top:-16px;left:0;right:0;text-align:center;font-size:10px}
/* Score ring */
.ring{position:relative;width:120px;height:120px}
.ring svg{transform:rotate(-90deg)}
.ring .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;font-weight:700}
.ring .val small{font-size:10px;color:var(--muted);font-weight:400}
/* Flashcard */
.flashcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;min-height:180px;display:flex;align-items:center;justify-content:center;padding:26px;font-size:17px;text-align:center;cursor:pointer;user-select:none}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 14px;cursor:pointer;color:var(--muted);font-weight:500;font-size:13px;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.checkitem{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.checkitem input[type=checkbox]{width:auto}
.checkitem.done label{text-decoration:line-through;color:var(--muted)}
.checkitem label{margin:0;font-weight:400;font-size:13px;color:var(--text);flex:1;cursor:pointer}
.diffline{font-family:ui-monospace,monospace;font-size:12px;padding:1px 8px;white-space:pre-wrap}
.diffline.add{background:rgba(63,185,80,.15);color:var(--accent2)}
.diffline.del{background:rgba(248,81,73,.15);color:var(--danger)}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.empty{text-align:center;padding:36px;color:var(--muted)}
.streakbox{display:flex;gap:3px;flex-wrap:wrap}
.streakbox .d{width:12px;height:12px;border-radius:3px;background:var(--bg3)}
.streakbox .d.on{background:var(--accent2)}
@media(max-width:800px){#sidebar{width:60px}#sidebar .logo{font-size:0;padding:16px 8px}#sidebar .logo::before{content:"🚀";font-size:20px}.nav-item{justify-content:center}.nav-item .lbl{display:none}#main{margin-left:60px}#sidebar .foot{display:none}}
@media print{#sidebar,#topbar,.no-print{display:none!important}#main{margin:0}body{background:#fff;color:#000}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">🚀 Career<span>OS</span></div>
    <nav id="nav"></nav>
    <div class="foot">CareerOS v1.0<br>Synced to your account.</div>
  </aside>
  <div id="main">
    <div id="topbar">
      <h1 id="pagetitle">Dashboard</h1>
      <div id="searchwrap">
        <input id="globalsearch" placeholder="Search jobs, contacts, resumes, notes…" autocomplete="off">
        <div id="searchresults"></div>
      </div>
      <button class="btn sm ghost" onclick="toggleTheme()" id="themebtn" title="Toggle theme">🌙</button>
      <button class="btn sm ghost" onclick="if(confirm('Sign out?'))top.location.href='/api/auth/signout'" title="Sign out">🚪</button>
    </div>
    <div id="content"></div>
  </div>
</div>
<div id="modalbg" onclick="if(event.target===this)closeModal()"><div id="modal"></div></div>
<div id="toast"></div>
<script>
"use strict";
/* ============ STATE ============ */
const LS_KEY="careeros_v1";
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
const now=()=>new Date().toISOString();
function defaultState(){
  return {
    settings:{theme:"dark",name:"Mason",targetRole:"Backend Engineer",targetTimeline:12,
      widgets:{readiness:true,goals:true,focus:true,interviews:true,pipeline:true,certs:true,github:true,learning:true,salary:true}},
    goals:[],tasks:[],resumes:[],jobs:[],contacts:[],sessions:[],certs:[],learning:[],
    github:{username:"",data:null,showcase:[],lastSync:null},
    coach:[],activity:{},automations:[
      {id:uid(),trigger:"cert_complete",action:"Add resume-update + LinkedIn post tasks",on:true},
      {id:uid(),trigger:"offer_received",action:"Create offer comparison reminder",on:true},
      {id:uid(),trigger:"rejection",action:"Log reason + suggest skill focus",on:true}
    ]
  };
}
let S=defaultState();
function save(){localStorage.setItem(LS_KEY,JSON.stringify(S));schedulePush();}
let _pushT=null;
function schedulePush(){clearTimeout(_pushT);_pushT=setTimeout(pushState,800);}
async function pushState(){try{await fetch('/api/state',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)});}catch(e){}}
async function boot(){
  try{
    const r=await fetch('/api/state');
    if(r.status===401){top.location.href='/signin';return;}
    const data=r.ok?await r.json():null;
    if(data&&data.settings){S=Object.assign(defaultState(),data);}
    else{const raw=localStorage.getItem(LS_KEY);S=raw?Object.assign(defaultState(),JSON.parse(raw)):seed(defaultState());pushState();}
  }catch(e){const raw=localStorage.getItem(LS_KEY);S=raw?Object.assign(defaultState(),JSON.parse(raw)):seed(defaultState());}
  localStorage.setItem(LS_KEY,JSON.stringify(S));
  applyTheme();render();
}
function resetDemo(){if(!confirm('Erase ALL data and restore demo seed?'))return;S=seed(defaultState());save();pushState().then(()=>location.reload());}
function resetEmpty(){if(!confirm('Erase ALL data and start empty?'))return;S=defaultState();save();pushState().then(()=>location.reload());}
function seed(s){
  const d=(off)=>{const t=new Date();t.setDate(t.getDate()+off);return t.toISOString().slice(0,10);};
  s.goals=[{id:uid(),text:"Apply to 5 backend roles",done:false},{id:uid(),text:"Finish AWS SAA practice exam #2",done:false},{id:uid(),text:"Two mock interviews (1 behavioral, 1 system design)",done:false},{id:uid(),text:"Reach out to 3 contacts",done:true}];
  s.tasks=[{id:uid(),text:"Solve 2 LeetCode mediums (graphs)",done:false,date:today()},{id:uid(),text:"Rewrite top 3 resume bullets with metrics",done:false,date:today()},{id:uid(),text:"30 min AWS flashcards",done:true,date:today()}];
  s.resumes=[{id:uid(),name:"Backend Engineer v3",target:"Backend Engineer",updated:now(),history:[],
    sections:{summary:"Software engineer with 3 years of experience building web services in Node.js and Python. Passionate about distributed systems, API design, and developer tooling.",
    skills:"JavaScript, TypeScript, Node.js, Python, PostgreSQL, Docker, REST APIs, Git, AWS (EC2, S3, Lambda), Redis",
    experience:[{company:"Acme Corp",role:"Software Engineer II",dates:"2024 – Present",bullets:["Responsible for maintaining the order processing service","Reduced API p95 latency from 800ms to 180ms by adding Redis caching and query optimization","Worked on the migration to microservices","Mentored 2 junior engineers through onboarding and code reviews"]},
      {company:"StartupXYZ",role:"Junior Developer",dates:"2022 – 2024",bullets:["Helped build the customer dashboard in React","Built CI pipeline with GitHub Actions cutting deploy time by 60%","Was involved in on-call rotation"]}],
    education:"B.S. Computer Science, Kennesaw State University — 2022",
    projects:"DevDash — open-source developer metrics dashboard (Node.js, PostgreSQL, 240+ GitHub stars)"}}];
  s.jobs=[
    {id:uid(),company:"Stripe",role:"Backend Engineer",link:"",jd:"Build and scale payment APIs. Requirements: strong experience with distributed systems, API design, Go or Java, PostgreSQL, event-driven architecture, observability.",stage:"phone_screen",salaryMin:165000,salaryMax:210000,compNotes:"L2 band per levels.fyi",recruiter:{name:"Dana Kim",email:"dana@stripe.example",phone:""},interviews:[{id:uid(),type:"Phone screen — coding",date:d(3)+"T14:00"}],followUp:d(1),offer:null,rejection:null,notes:"Referred by Priya.",created:d(-12),statusLog:[{stage:"applied",date:d(-12)},{stage:"phone_screen",date:d(-4)}]},
    {id:uid(),company:"Datadog",role:"Software Engineer, Backend",link:"",jd:"Work on high-throughput ingestion pipelines. Go, Kafka, Cassandra, Kubernetes. Strong CS fundamentals, system design.",stage:"applied",salaryMin:150000,salaryMax:190000,compNotes:"",recruiter:{name:"",email:"",phone:""},interviews:[],followUp:d(4),offer:null,rejection:null,notes:"",created:d(-6),statusLog:[{stage:"applied",date:d(-6)}]},
    {id:uid(),company:"Shopify",role:"Senior Backend Developer",link:"",jd:"Ruby/Rails or Node.js services at scale. Mentorship, system design, GraphQL APIs, MySQL, caching strategies.",stage:"onsite",salaryMin:160000,salaryMax:200000,compNotes:"Flex comp model",recruiter:{name:"Marc Boucher",email:"marc@shopify.example",phone:""},interviews:[{id:uid(),type:"Virtual onsite — system design",date:d(7)+"T10:00"},{id:uid(),type:"Virtual onsite — values",date:d(7)+"T13:00"}],followUp:"",offer:null,rejection:null,notes:"",created:d(-20),statusLog:[{stage:"applied",date:d(-20)},{stage:"phone_screen",date:d(-10)},{stage:"onsite",date:d(-2)}]},
    {id:uid(),company:"CloudNine (startup)",role:"Full-Stack Engineer",link:"",jd:"TypeScript, React, Node, Postgres. Small team, high ownership.",stage:"offer",salaryMin:140000,salaryMax:155000,compNotes:"",recruiter:{name:"Alex Rivera",email:"alex@cloudnine.example",phone:""},interviews:[],followUp:d(2),offer:{base:150000,bonus:10000,equity:"0.15% (4yr vest)",benefits:"Health/dental/vision, 401k 4% match",location:"Atlanta, GA",remote:"Hybrid (2 days)"},rejection:null,notes:"Deadline to respond: next Friday",created:d(-30),statusLog:[{stage:"applied",date:d(-30)},{stage:"onsite",date:d(-9)},{stage:"offer",date:d(-1)}]},
    {id:uid(),company:"Google",role:"Software Engineer III",link:"",jd:"Generalist SWE. Strong algorithms, system design, distributed systems.",stage:"rejected",salaryMin:170000,salaryMax:220000,compNotes:"",recruiter:{name:"",email:"",phone:""},interviews:[],followUp:"",offer:null,rejection:{reason:"Did not pass onsite — feedback cited system design depth",tags:["system design"]},notes:"Re-apply after 12 months",created:d(-60),statusLog:[{stage:"applied",date:d(-60)},{stage:"onsite",date:d(-35)},{stage:"rejected",date:d(-28)}]},
    {id:uid(),company:"Netflix",role:"Backend Engineer, Streaming",link:"",jd:"Java, distributed systems, high scale.",stage:"wishlist",salaryMin:0,salaryMax:0,compNotes:"",recruiter:{name:"",email:"",phone:""},interviews:[],followUp:"",offer:null,rejection:null,notes:"Wait until system design prep is stronger",created:d(-3),statusLog:[]}
  ];
  s.contacts=[
    {id:uid(),name:"Priya Sharma",role:"Staff Engineer",company:"Stripe",type:"Mentor",linkedin:"",email:"priya@example.com",notes:"Met at RenderATL. Offered referral.",interactions:[{date:d(-8),kind:"Coffee chat",note:"Discussed distributed systems learning path; she suggested DDIA book."},{date:d(-30),kind:"LinkedIn",note:"Initial connect + thanks"}],followUp:d(5)},
    {id:uid(),name:"Marcus Lee",role:"Engineering Manager",company:"Datadog",type:"Recruiter/Hiring",linkedin:"",email:"",notes:"Responded to cold outreach.",interactions:[{date:d(-15),kind:"LinkedIn",note:"Asked about team openings"}],followUp:d(1)},
    {id:uid(),name:"Jen Ortiz",role:"SWE",company:"Google",type:"Alumni",linkedin:"",email:"",notes:"KSU alum, same graduating class.",interactions:[{date:d(-45),kind:"Message",note:"Congratulated on new role"}],followUp:""},
    {id:uid(),name:"Sam Chen",role:"Bootcamp peer",company:"Shopify",type:"Peer",linkedin:"",email:"",notes:"Study buddy for system design.",interactions:[{date:d(-2),kind:"Call",note:"Mock system design session — URL shortener"}],followUp:d(7)}
  ];
  s.certs=[
    {id:uid(),name:"AWS Solutions Architect Associate",provider:"AWS",targetDate:d(45),progress:62,plan:{dailyMin:45,weeklyTopics:2},flashcards:[
      {id:uid(),front:"What S3 storage class is cheapest for rarely-accessed data with retrieval in hours?",back:"S3 Glacier Deep Archive",box:2},
      {id:uid(),front:"Max size of a single S3 object?",back:"5 TB",box:1},
      {id:uid(),front:"Which service provides managed NAT for private subnets?",back:"NAT Gateway",box:3}],
      examHistory:[{date:d(-10),score:68,total:100},{date:d(-3),score:74,total:100}]},
    {id:uid(),name:"CompTIA Security+",provider:"CompTIA",targetDate:d(120),progress:15,plan:{dailyMin:30,weeklyTopics:1},flashcards:[],examHistory:[]}
  ];
  s.learning=[
    {id:uid(),title:"Designing Data-Intensive Applications",type:"Book",total:600,done:210,unit:"pages",log:[d(-1),d(-2),d(-4),d(-5),d(-6)]},
    {id:uid(),title:"LeetCode — NeetCode 150",type:"Coding practice",total:150,done:87,unit:"problems",log:[d(0),d(-1),d(-2),d(-3),d(-5),d(-6),d(-7)]},
    {id:uid(),title:"WGU B.S. Software Engineering",type:"Degree",total:120,done:78,unit:"credits",log:[d(-3)]},
    {id:uid(),title:"System Design Primer (course)",type:"Course",total:24,done:9,unit:"modules",log:[d(-2),d(-9)]},
    {id:uid(),title:"DevDash side project v2",type:"Project",total:12,done:5,unit:"milestones",log:[d(-4)]}
  ];
  const t=new Date();for(let i=0;i<40;i++){const dt=new Date(t);dt.setDate(dt.getDate()-i);if(i%7!==3&&i%11!==5)s.activity[dt.toISOString().slice(0,10)]=true;}
  s.coach=[{role:"ai",text:"Hi Mason! I'm your AI career coach. I can see your resumes, job pipeline, learning progress, certifications, and GitHub stats. Try asking:\n\n• \"What should I study today?\"\n• \"Am I ready for a Google interview?\"\n• \"What skills am I missing for senior backend roles?\"\n• \"Write a follow-up message to my Stripe recruiter.\""}];
  return s;
}
/* ============ HELPERS ============ */
const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt$=n=>n?("$"+Number(n).toLocaleString()):"—";
const fmtDate=s=>{if(!s)return"—";const d=new Date(s.length<=10?s+"T00:00":s);return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});};
const daysUntil=s=>{if(!s)return null;return Math.ceil((new Date(s.slice(0,10)+"T00:00")-new Date(today()+"T00:00"))/864e5);};
function toast(msg){const t=$("#toast");t.textContent=msg;t.style.display="block";clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",2600);}
function openModal(html){$("#modal").innerHTML=html;$("#modalbg").classList.add("open");}
function closeModal(){$("#modalbg").classList.remove("open");}
function download(name,content,type){const b=new Blob([content],{type:type||"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}
function markActive(){S.activity[today()]=true;save();}
function ring(pct,color,label){const r=52,c=2*Math.PI*r;const col=color||"var(--accent)";return `<div class="ring"><svg width="120" height="120"><circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--bg3)" stroke-width="10"/><circle cx="60" cy="60" r="${r}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct/100)}"/></svg><div class="val">${Math.round(pct)}<small>${label||""}</small></div></div>`;}

const ROLE_SKILLS={
"Backend Engineer":["API design","SQL / PostgreSQL","System design","Caching (Redis)","Message queues (Kafka/SQS)","Docker","Kubernetes","Testing","Observability / monitoring","Cloud (AWS/GCP)","Data structures & algorithms","Authentication / security"],
"Frontend Engineer":["React","TypeScript","CSS / responsive design","State management","Testing (Jest/Cypress)","Accessibility","Performance optimization","Build tooling","REST/GraphQL consumption","Design systems"],
"Full-Stack Engineer":["React","Node.js","TypeScript","SQL","API design","Testing","Docker","Cloud (AWS/GCP)","CI/CD","System design"],
"DevOps Engineer":["Linux","Docker","Kubernetes","Terraform / IaC","CI/CD","Cloud (AWS/GCP/Azure)","Monitoring (Prometheus/Datadog)","Scripting (Bash/Python)","Networking","Security basics"],
"Data Engineer":["SQL","Python","ETL / pipelines","Spark","Airflow","Data warehousing","Kafka / streaming","Cloud data services","Data modeling","dbt"],
"ML Engineer":["Python","PyTorch/TensorFlow","ML fundamentals","Data pipelines","Model deployment","SQL","Cloud ML services","Experiment tracking","Statistics","LLM / prompt engineering"],
"Mobile Engineer":["Swift or Kotlin","React Native/Flutter","Mobile UI patterns","App store deployment","Offline sync","Push notifications","Testing","Performance profiling"],
"Security Engineer":["Networking","Linux","Threat modeling","OWASP Top 10","SIEM tools","Scripting (Python)","Cloud security","Incident response","Cryptography basics","Compliance frameworks"]};
const SALARY_BANDS={"Backend Engineer":[95,135,175],"Frontend Engineer":[90,130,165],"Full-Stack Engineer":[92,132,170],"DevOps Engineer":[100,140,180],"Data Engineer":[100,140,180],"ML Engineer":[115,155,200],"Mobile Engineer":[95,135,172],"Security Engineer":[105,145,185]};
function resumeSkillsList(r){return (r?.sections.skills||"").split(/[,;]/).map(s=>s.trim()).filter(Boolean);}
function skillGap(role,resume){
  const need=ROLE_SKILLS[role]||ROLE_SKILLS["Backend Engineer"];
  const haveText=(resume?JSON.stringify(resume.sections):"").toLowerCase()+" "+S.learning.map(l=>l.title).join(" ").toLowerCase()+" "+S.certs.map(c=>c.name).join(" ").toLowerCase();
  const have=[],missing=[];
  need.forEach(sk=>{const keys=sk.toLowerCase().split(/[\/\(\)]/).map(x=>x.trim()).filter(x=>x.length>2);(keys.some(k=>haveText.includes(k))?have:missing).push(sk);});
  return {have,missing,coverage:Math.round(100*have.length/need.length)};
}
</script>
<script>
/* ============ READINESS & DASHBOARD ============ */
function resumeScore(r){
  if(!r)return 0;let sc=40;const sec=r.sections;
  const bullets=sec.experience.flatMap(e=>e.bullets);
  const quant=bullets.filter(b=>/\d/.test(b)).length;
  sc+=Math.min(20,quant*5);
  sc+=Math.min(10,resumeSkillsList(r).length);
  if(sec.summary&&sec.summary.length>60)sc+=8;
  if(sec.projects)sc+=7;if(sec.education)sc+=5;
  const weak=bullets.filter(b=>/^(responsible for|worked on|helped|was involved|assisted)/i.test(b.trim())).length;
  sc-=weak*4;
  return Math.max(5,Math.min(100,sc));
}
function interviewAvg(){const scored=S.sessions.filter(s=>s.score!=null);return scored.length?Math.round(scored.reduce((a,s)=>a+s.score,0)/scored.length):0;}
function streakDays(){let n=0;const t=new Date();for(;;){const k=t.toISOString().slice(0,10);if(S.activity[k]){n++;t.setDate(t.getDate()-1);}else{if(n===0&&k===today()){t.setDate(t.getDate()-1);if(S.activity[t.toISOString().slice(0,10)]){continue;}}break;}}return n;}
function consistency(){let c=0;const t=new Date();for(let i=0;i<28;i++){const d=new Date(t);d.setDate(d.getDate()-i);if(S.activity[d.toISOString().slice(0,10)])c++;}return Math.round(100*c/28);}
function pipelineCounts(){const c={};S.jobs.forEach(j=>c[j.stage]=(c[j.stage]||0)+1);return c;}
function readiness(){
  const r=S.resumes[0]?Math.max(...S.resumes.map(resumeScore)):0;
  const gap=skillGap(S.settings.targetRole,S.resumes[0]);
  const active=S.jobs.filter(j=>!["wishlist","rejected"].includes(j.stage)).length;
  const pipe=Math.min(100,active*18);
  const iv=S.sessions.length?Math.min(100,interviewAvg()*0.7+S.sessions.length*6):0;
  const learn=consistency();
  const total=Math.round(r*0.25+gap.coverage*0.2+pipe*0.2+iv*0.2+learn*0.15);
  return {total,parts:{Resume:r,Skills:gap.coverage,Pipeline:pipe,"Interview prep":Math.round(iv),Consistency:learn}};
}
function salaryProjection(){
  const band=SALARY_BANDS[S.settings.targetRole]||[95,135,175];
  const gap=skillGap(S.settings.targetRole,S.resumes[0]);
  const pos=gap.coverage/100;
  const est=Math.round(band[0]+(band[2]-band[0])*pos);
  return {est:est*1000,low:band[0]*1000,high:band[2]*1000,pos};
}
function upcomingInterviews(){
  const out=[];S.jobs.forEach(j=>j.interviews.forEach(iv=>{if(new Date(iv.date)>=new Date(today()))out.push({...iv,company:j.company,role:j.role,jobId:j.id});}));
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}
function toggleGoal(id){const g=S.goals.find(x=>x.id===id);g.done=!g.done;markActive();save();render();}
function toggleTask(id){const t=S.tasks.find(x=>x.id===id);t.done=!t.done;markActive();save();render();}
function addGoal(){const v=$("#newgoal").value.trim();if(!v)return;S.goals.push({id:uid(),text:v,done:false});save();render();}
function addTask(){const v=$("#newtask").value.trim();if(!v)return;S.tasks.push({id:uid(),text:v,done:false,date:today()});save();render();}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id);save();render();}
function delTask(id){S.tasks=S.tasks.filter(g=>g.id!==id);save();render();}
function toggleWidget(k){S.settings.widgets[k]=!S.settings.widgets[k];save();render();}
function checklist(items,toggleFn,delFn){
  return items.map(i=>`<div class="checkitem ${i.done?"done":""}"><input type="checkbox" ${i.done?"checked":""} onchange="${toggleFn}('${i.id}')"><label onclick="${toggleFn}('${i.id}')">${esc(i.text)}</label><button class="btn sm ghost" onclick="${delFn}('${i.id}')">✕</button></div>`).join("")||`<div class="muted small">Nothing yet.</div>`;
}
function viewDashboard(){
  const W=S.settings.widgets;const rd=readiness();const sp=salaryProjection();
  const ivs=upcomingInterviews();const pc=pipelineCounts();const gh=S.github.data;
  const stk=streakDays();
  const widgets=[];
  if(W.readiness)widgets.push(`<div class="card"><h3>Career Readiness <button class="btn sm ghost no-print" onclick="nav('analytics')">details</button></h3>
    <div class="row">${ring(rd.total,rd.total>=70?"var(--accent2)":rd.total>=45?"var(--warn)":"var(--danger)","/ 100")}
    <div style="flex:1;min-width:140px">${Object.entries(rd.parts).map(([k,v])=>`<div class="small spread"><span class="muted">${k}</span><b>${v}</b></div><div class="progress mb" style="height:5px"><div style="width:${v}%"></div></div>`).join("")}</div></div></div>`);
  if(W.interviews)widgets.push(`<div class="card"><h3>Upcoming Interviews</h3>${ivs.length?ivs.slice(0,4).map(iv=>{const du=daysUntil(iv.date);return `<div class="spread mb"><div><b>${esc(iv.company)}</b><div class="small muted">${esc(iv.type)} · ${fmtDate(iv.date)} ${iv.date.includes("T")?iv.date.slice(11,16):""}</div></div><span class="badge ${du<=2?"red":du<=5?"yellow":"blue"}">${du===0?"Today":du+"d"}</span></div>`;}).join("")+`<button class="btn sm" onclick="exportICS()">📅 Export to calendar (.ics)</button>`:`<div class="muted small">No interviews scheduled. Keep applying!</div>`}</div>`);
  if(W.goals)widgets.push(`<div class="card"><h3>Weekly Goals</h3>${checklist(S.goals,"toggleGoal","delGoal")}<div class="row mt"><input id="newgoal" placeholder="Add goal…" onkeydown="if(event.key==='Enter')addGoal()"><button class="btn sm" onclick="addGoal()">Add</button></div></div>`);
  if(W.focus)widgets.push(`<div class="card"><h3>Today's Focus</h3>${checklist(S.tasks.filter(t=>t.date===today()||!t.done),"toggleTask","delTask")}<div class="row mt"><input id="newtask" placeholder="Add task…" onkeydown="if(event.key==='Enter')addTask()"><button class="btn sm" onclick="addTask()">Add</button></div></div>`);
  if(W.pipeline)widgets.push(`<div class="card" onclick="nav('jobs')" style="cursor:pointer"><h3>Application Pipeline</h3><div class="row">${STAGES.filter(s=>pc[s[0]]).map(([k,l])=>`<div style="text-align:center;flex:1"><div class="big">${pc[k]||0}</div><div class="small muted">${l}</div></div>`).join("")||'<div class="muted small">No applications yet.</div>'}</div></div>`);
  if(W.certs)widgets.push(`<div class="card" onclick="nav('certs')" style="cursor:pointer"><h3>Certifications</h3>${S.certs.map(c=>`<div class="small spread"><span>${esc(c.name)}</span><b>${c.progress}%</b></div><div class="progress green mb"><div style="width:${c.progress}%"></div></div>`).join("")||'<div class="muted small">No certifications tracked.</div>'}</div>`);
  if(W.github)widgets.push(`<div class="card" onclick="nav('github')" style="cursor:pointer"><h3>GitHub Activity</h3>${gh?`<div class="row"><div style="flex:1;text-align:center"><div class="big">${gh.publicRepos}</div><div class="small muted">repos</div></div><div style="flex:1;text-align:center"><div class="big">${gh.totalStars}</div><div class="small muted">stars</div></div><div style="flex:1;text-align:center"><div class="big">${gh.recentPushes}</div><div class="small muted">recent pushes</div></div></div><div class="small muted mt">Top: ${esc(Object.keys(gh.languages).slice(0,3).join(", ")||"—")}</div>`:`<div class="muted small">Connect GitHub in the GitHub tab.</div>`}</div>`);
  if(W.learning)widgets.push(`<div class="card"><h3>Learning Streak</h3><div class="row"><div><div class="big">🔥 ${stk}</div><div class="small muted">day streak</div></div><div><div class="big">${consistency()}%</div><div class="small muted">28-day consistency</div></div></div><div class="streakbox mt">${(()=>{let h="";for(let i=27;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);h+=`<div class="d ${S.activity[d.toISOString().slice(0,10)]?"on":""}" title="${d.toISOString().slice(0,10)}"></div>`;}return h;})()}</div></div>`);
  if(W.salary)widgets.push(`<div class="card"><h3>Salary Projection</h3><div class="big">${fmt$(sp.est)}</div><div class="small muted">Estimated market value as ${esc(S.settings.targetRole)} (skill coverage ${Math.round(sp.pos*100)}%)</div><div class="progress mt"><div style="width:${sp.pos*100}%"></div></div><div class="small muted spread mt"><span>${fmt$(sp.low)}</span><span>${fmt$(sp.high)}</span></div></div>`);
  return `<div class="spread mb"><div><b style="font-size:18px">Welcome back, ${esc(S.settings.name)} 👋</b><div class="muted small">Target: ${esc(S.settings.targetRole)} · ${new Date().toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"})}</div></div>
  <div class="row no-print"><button class="btn sm" onclick="openWidgetConfig()">⚙️ Widgets</button><button class="btn sm primary" onclick="nav('coach')">🤖 Ask Coach</button></div></div>
  <div class="grid g2">${widgets.join("")}</div>`;
}
function openWidgetConfig(){
  const names={readiness:"Readiness score",goals:"Weekly goals",focus:"Daily focus",interviews:"Interviews",pipeline:"Pipeline",certs:"Certifications",github:"GitHub",learning:"Learning streak",salary:"Salary projection"};
  openModal(`<h2>Configure dashboard widgets</h2><p class="muted small mb">Match your focus: learning, job hunt, or promotion.</p>${Object.entries(names).map(([k,l])=>`<div class="checkitem"><input type="checkbox" ${S.settings.widgets[k]?"checked":""} onchange="toggleWidget('${k}')"><label>${l}</label></div>`).join("")}<div class="row mt"><button class="btn primary" onclick="closeModal()">Done</button></div>`);
}
function exportICS(){
  const ivs=upcomingInterviews();if(!ivs.length)return toast("No upcoming interviews");
  let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//CareerOS//EN\r\n";
  ivs.forEach(iv=>{const dt=iv.date.replace(/[-:]/g,"").slice(0,13)+"00";ics+=`BEGIN:VEVENT\r\nUID:${iv.id}@careeros\r\nDTSTART:${dt}\r\nSUMMARY:${iv.company} — ${iv.type}\r\nDESCRIPTION:${iv.role}\r\nEND:VEVENT\r\n`;});
  ics+="END:VCALENDAR";download("careeros-interviews.ics",ics,"text/calendar");toast("Calendar file downloaded");
}
/* ============ RESUME MANAGER ============ */
const STRONG_VERBS={"responsible for":"Owned","worked on":"Delivered","helped":"Drove","helped build":"Built","was involved in":"Led","assisted":"Supported","participated in":"Contributed to","made":"Created","did":"Executed","used":"Leveraged","worked with":"Collaborated with"};
function optimizeBullet(b){
  let out=b.trim();let notes=[];
  for(const[weak,strong]of Object.entries(STRONG_VERBS)){const re=new RegExp("^"+weak,"i");if(re.test(out)){out=out.replace(re,strong);notes.push(`Replaced weak opener "${weak}" → "${strong}"`);break;}}
  if(!/\d/.test(out)){notes.push("Add a metric (%, $, time saved, scale) to show impact");out=out.replace(/\.?$/,"")+" — [quantify impact: e.g., % improvement, users served, time saved]";}
  if(out.length>0)out=out[0].toUpperCase()+out.slice(1);
  if(!notes.length)notes.push("Strong bullet — action verb + measurable result ✓");
  return{text:out,notes};
}
function curResume(){return S.resumes.find(r=>r.id===window._navArg)||S.resumes[0];}
function snapshotResume(r){r.history.unshift({ts:now(),snapshot:JSON.stringify(r.sections)});if(r.history.length>20)r.history.pop();}

  <div class="grid" style="grid-template-columns:1fr 320px">
    <div>
      <div class="card mb"><h3>Editor — ${esc(r.name)} <button class="btn sm" onclick="renameResume('${r.id}')">rename</button></h3>
        <label>Target role</label><select onchange="const r=curResume();r.target=this.value;snapAndSave(r)">${Object.keys(ROLE_SKILLS).map(k=>`<option ${((r.target||S.settings.targetRole)===k)?"selected":""}>${k}</option>`).join("")}</select>
        <label>Professional summary</label><textarea onchange="const r=curResume();r.sections.summary=this.value;snapAndSave(r)">${esc(r.sections.summary)}</textarea>
        <label>Skills (comma-separated)</label><textarea onchange="const r=curResume();r.sections.skills=this.value;snapAndSave(r)">${esc(r.sections.skills)}</textarea>
        <label>Experience</label>
        ${r.sections.experience.map((e,i)=>`<div class="card mb" style="background:var(--bg)">
          <div class="row"><input value="${esc(e.company)}" placeholder="Company" onchange="curResume().sections.experience[${i}].company=this.value;snapAndSave(curResume())" style="flex:2"><input value="${esc(e.role)}" placeholder="Role" onchange="curResume().sections.experience[${i}].role=this.value;snapAndSave(curResume())" style="flex:2"><input value="${esc(e.dates)}" placeholder="Dates" onchange="curResume().sections.experience[${i}].dates=this.value;snapAndSave(curResume())" style="flex:1"></div>
          <label>Bullets (one per line)</label><textarea onchange="curResume().sections.experience[${i}].bullets=this.value.split('\\n').filter(Boolean);snapAndSave(curResume())">${esc(e.bullets.join("\n"))}</textarea>
          <button class="btn sm danger mt" onclick="curResume().sections.experience.splice(${i},1);snapAndSave(curResume());render()">Remove role</button></div>`).join("")}
        <button class="btn sm" onclick="curResume().sections.experience.push({company:'',role:'',dates:'',bullets:[]});save();render()">＋ Add role</button>
        <label>Education</label><textarea onchange="const r=curResume();r.sections.education=this.value;snapAndSave(r)">${esc(r.sections.education)}</textarea>
        <label>Projects</label><textarea onchange="const r=curResume();r.sections.projects=this.value;snapAndSave(r)">${esc(r.sections.projects)}</textarea>
      </div>
      <div class="card mb"><h3>🤖 AI Tools</h3>
        <div class="row"><button class="btn primary sm" onclick="aiOptimizeResume('${r.id}')">✨ Optimize bullet points</button>

      </div>

      <div class="card mb"><h3>Resume Score</h3><div class="row">${ring(score,score>=70?"var(--accent2)":"var(--warn)","/ 100")}<div class="small muted" style="flex:1">Based on clarity, quantified impact, skills breadth, and completeness.</div></div></div>

function runTailor(id){
  const r=S.resumes.find(x=>x.id===id);
  let jd=$("#tailorjd").value.trim();const jobId=$("#tailorjob").value;
  if(!jd&&jobId)jd=S.jobs.find(j=>j.id===jobId).jd;
  if(!jd)return toast("Paste a job description first");
  const stop=new Set("the a an and or of to in for with on at by is are be will you our we as that this from your their have has must plus etc who they able".split(" "));
  const words=jd.toLowerCase().match(/[a-z][a-z+#.\-]{2,}/g)||[];
  const freq={};words.forEach(w=>{if(!stop.has(w))freq[w]=(freq[w]||0)+1;});
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,18).map(x=>x[0]);
  const rtext=JSON.stringify(r.sections).toLowerCase();
  const matched=top.filter(k=>rtext.includes(k)),missing=top.filter(k=>!rtext.includes(k));
  const matchPct=Math.round(100*matched.length/top.length);
  $("#tailorout").innerHTML=`<div class="card mt" style="background:var(--bg)">
    <div class="spread"><b>Match score</b><span class="badge ${matchPct>=70?"green":matchPct>=40?"yellow":"red"}">${matchPct}%</span></div>
    <div class="progress mt mb"><div style="width:${matchPct}%"></div></div>
    <div class="small"><b>✓ Matched keywords:</b> <span class="muted">${matched.map(esc).join(", ")||"none"}</span></div>
    <div class="small mt"><b>✗ Missing keywords:</b> <span class="muted">${missing.map(esc).join(", ")||"none"}</span></div>
    <div class="small mt"><b>Recommendations:</b><br>· Weave the missing keywords into your summary/skills where truthful.<br>· Mirror the JD's exact phrasing (ATS matches literal strings).<br>· Lead bullets with the JD's top requirements: ${top.slice(0,3).map(esc).join(", ")}.</div>
    <button class="btn sm primary mt" onclick="applyTailor('${id}',${JSON.stringify(missing.slice(0,8)).replace(/"/g,"&quot;")})">Add missing keywords to skills</button></div>`;
}

function atsCheck(id){
  const r=S.resumes.find(x=>x.id===id);const sec=r.sections;const checks=[];
  const add=(ok,label,fix)=>checks.push({ok,label,fix});
  add(!!sec.summary,"Professional summary present","Add a 2–3 sentence summary");
  add(resumeSkillsList(r).length>=8,"8+ skills listed","List more relevant hard skills");
  add(sec.experience.length>0,"Work experience present","Add at least one role");
  add(sec.experience.every(e=>e.dates),"All roles have dates","ATS parsers need date ranges");
  const bullets=sec.experience.flatMap(e=>e.bullets);
  add(bullets.filter(b=>/\d/.test(b)).length>=bullets.length/2,"Majority of bullets quantified","Add metrics to more bullets");
  add(!bullets.some(b=>b.length>220),"No overlong bullets (>220 chars)","Split long bullets");
  add(!!sec.education,"Education section present","Add education");
  add(!/[│┃▪◦→]/.test(JSON.stringify(sec)),"No exotic symbols","Replace special glyphs — they break parsers");
  const passed=checks.filter(c=>c.ok).length;
  $("#aiout").innerHTML=`<div class="card mt" style="background:var(--bg)"><div class="spread"><b>🧾 ATS Compatibility</b><span class="badge ${passed>=7?"green":passed>=5?"yellow":"red"}">${passed}/${checks.length} passed</span></div>

}

  if(!c.interactions.length)return 0;

  const recencyPts=rec<=7?50:rec<=21?38:rec<=45?25:rec<=90?12:4;
  const depthPts=Math.min(50,c.interactions.length*10+(c.interactions.some(i=>["Coffee chat","Call","Meeting"].includes(i.kind))?15:0));
  return Math.min(100,recencyPts+depthPts);
}

function analyzeAnswer(text,kind){
  const t=text.toLowerCase();const words=text.trim().split(/\s+/).filter(Boolean);
  let score=0;const fb=[],str=[];
  const fillerCount=FILLERS.reduce((n,f)=>n+(t.match(new RegExp("\\b"+f.replace(" ","\\s+")+"\\b","g"))||[]).length,0);
  const clarity=Math.max(0,100-Math.round(300*fillerCount/Math.max(20,words.length)));
  if(kind==="behavioral"){
    const star={Situation:/\b(when|while|at the time|situation|context|during|last year|in my (role|job|team))\b/.test(t),
      Task:/\b(task|goal|responsib|needed to|had to|asked to|my job was)\b/.test(t),
      Action:/\b(i (decided|built|led|created|organized|implemented|wrote|spoke|proposed|refactored|set up|reached out|analyzed))\b/.test(t),
      Result:/\b(result|outcome|improved|increased|reduced|saved|led to|as a result|ended up|learned|shipped|delivered)\b/.test(t)};
    const hits=Object.values(star).filter(Boolean).length;score+=hits*18;
    Object.entries(star).forEach(([k,v])=>v?str.push(k+" ✓"):fb.push(`Missing clear ${k} — STAR answers need it`));
    if(/\d/.test(text)){score+=12;str.push("Quantified impact ✓");}else fb.push("Add numbers (%, time, scale) to the result");
    if(/\bwe\b/.test(t)&&!/\bi\b/.test(t))fb.push('Too much "we" — interviewers want YOUR contribution ("I")');
    if(words.length<40)fb.push("Answer is thin — aim for 60–150 words with concrete detail");
    else if(words.length>280)fb.push("Answer is long — tighten to ~2 minutes");
    else score+=16;
  }else if(kind==="design"){
    const aspects={"requirements/estimates":/\b(requirement|estimate|qps|users|scale|traffic|assumption)\b/,"API":/\b(api|endpoint|request|rest|grpc)\b/,"data model":/\b(schema|table|database|data model|store|postgres|sql|nosql)\b/,"caching":/\b(cache|redis|cdn|memcache)\b/,"scaling":/\b(shard|partition|replica|load balanc|horizontal|queue|async)\b/,"trade-offs":/\b(trade|versus|vs|alternative|instead|depends|downside)\b/};
    Object.entries(aspects).forEach(([k,re])=>{if(re.test(t)){score+=14;str.push("Covered "+k);}else fb.push("Didn't address "+k);});
    if(words.length>100)score+=16;else fb.push("Go deeper — real interviews expect 30–45 min of depth");
  }else{
    if(/\b(o\(|complexity|time|space)\b/.test(t)){score+=25;str.push("Discussed complexity ✓");}else fb.push("State time/space complexity");
    if(/\b(edge|empty|null|overflow|duplicate|negative)\b/.test(t)){score+=25;str.push("Considered edge cases ✓");}else fb.push("Mention edge cases");
    if(/\b(hash|map|set|tree|heap|stack|queue|array|pointer|graph|dp|dynamic)\b/.test(t)){score+=25;str.push("Named data structures ✓");}else fb.push("Name the data structures/algorithms you'd use");
    if(words.length>=30)score+=15;else fb.push("Explain your approach out loud — thin explanations lose points");
  }
  score=Math.max(5,Math.min(100,score));
  if(fillerCount>3)fb.push(`${fillerCount} filler words detected — pause silently instead`);
  const confidence=Math.min(100,Math.round(score*0.6+clarity*0.4));
  return{score,clarity,confidence,fb,str,fillerCount,words:words.length};
}

function toggleMic(){

function submitAnswer(){

  const an=analyzeAnswer(text,kind);

function submitCoding(){
  const code=$("#ivcode").value.trim();if(!code)return toast("Write a solution first");
  const q=IV.qs[IV.i];const an=analyzeAnswer(code,"coding");
  const checks=[];
  if(/function|def |func |=>|class /.test(code))checks.push("Defines a function/structure ✓");else an.fb.push("No function definition detected");
  if(/\/\/|#|\/\*/.test(code))checks.push("Includes comments/explanation ✓");else an.fb.push("Add comments explaining your approach");
  if(/if|for|while|map|reduce|forEach/.test(code))checks.push("Has control flow ✓");
  an.str.push(...checks);

function nextIV(){
  IV.i++;

function finishIV(){
  let score,metrics={};
  if(IV.type==="technical"){const right=IV.answers.filter(a=>a.correct).length;score=Math.round(100*right/IV.answers.length);}

async function connectGithub(){
  const u=$("#ghuser").value.trim();if(!u)return toast("Enter a GitHub username");
  toast("Fetching public GitHub data…");
  try{
    const [userRes,repoRes,evRes]=await Promise.all([
      fetch(`https://api.github.com/users/${u}`),
      fetch(`https://api.github.com/users/${u}/repos?per_page=100&sort=pushed`),
      fetch(`https://api.github.com/users/${u}/events/public?per_page=100`)]);
    if(!userRes.ok)throw new Error("User not found (or rate-limited — try again later)");
    const user=await userRes.json(),repos=await repoRes.json(),events=evRes.ok?await evRes.json():[];
    const languages={};let totalStars=0;
    repos.forEach(r=>{if(r.language)languages[r.language]=(languages[r.language]||0)+1;totalStars+=r.stargazers_count;});
    const sortedLangs=Object.fromEntries(Object.entries(languages).sort((a,b)=>b[1]-a[1]));
    const pushDays={};let commits=0,prs=0;
    events.forEach(e=>{const d=e.created_at.slice(0,10);if(e.type==="PushEvent"){pushDays[d]=(pushDays[d]||0)+(e.payload.commits?.length||1);commits+=e.payload.commits?.length||1;}if(e.type==="PullRequestEvent")prs++;});
    S.github.username=u;S.github.lastSync=now();
    S.github.data={name:user.name||u,publicRepos:user.public_repos,followers:user.followers,totalStars,
      languages:sortedLangs,recentPushes:Object.keys(pushDays).length,commits,prs,pushDays,
      repos:repos.map(r=>({name:r.name,description:r.description,language:r.language,stars:r.stargazers_count,url:r.html_url,pushed:r.pushed_at,fork:r.fork,size:r.size,hasIssues:r.open_issues_count})).filter(r=>!r.fork).slice(0,30)};
    markActive();save();render();toast("GitHub connected ✓");
  }catch(e){toast("⚠️ "+e.message);}
}

async function aiCodeReview(name){
  const r=S.github.data.repos.find(x=>x.name===name);
  openModal(`<h2>🔍 AI code review — ${esc(name)}</h2><div id="crout" class="small muted">Analyzing repository structure…</div><button class="btn mt" onclick="closeModal()">Close</button>`);
  let files=[],languages={};
  try{
    const [treeRes,langRes]=await Promise.all([
      fetch(`https://api.github.com/repos/${S.github.username}/${name}/contents/`),
      fetch(`https://api.github.com/repos/${S.github.username}/${name}/languages`)]);
    if(treeRes.ok)files=(await treeRes.json()).map(f=>f.name);
    if(langRes.ok)languages=await langRes.json();
  }catch(e){}
  const has=re=>files.some(f=>re.test(f));
  const checks=[
    {ok:has(/^readme/i),good:"README present — first thing reviewers look at",bad:"No README — add one (use the README generator)"},
    {ok:has(/license/i),good:"License included",bad:"No LICENSE file — add MIT/Apache for open-source credibility"},
    {ok:has(/^\.gitignore$/),good:".gitignore present",bad:"Missing .gitignore — node_modules/secrets may be committed"},
    {ok:has(/test|spec|__tests__/i),good:"Test files/folder detected",bad:"No tests visible — even a few unit tests signal professionalism"},
    {ok:has(/\.github|\.gitlab|jenkins|\.circleci/i)||has(/workflows/),good:"CI configuration detected",bad:"No CI — add a GitHub Actions workflow (lint + test)"},
    {ok:has(/dockerfile|docker-compose/i),good:"Containerized (Docker)",bad:"Consider a Dockerfile for easy setup"},
    {ok:has(/\.env\.example|\.env\.sample/i)||!has(/^\.env$/),good:"No committed .env detected",bad:"⚠️ .env file may be committed — check for leaked secrets!"},
    {ok:!!r.description,good:"Repo description set",bad:"Add a one-line repo description — it shows in search & your profile"}];
  const passed=checks.filter(c=>c.ok).length;
  $("#crout").innerHTML=`<div class="spread"><b>Structure score</b><span class="badge ${passed>=6?"green":passed>=4?"yellow":"red"}">${passed}/${checks.length}</span></div>
  ${checks.map(c=>`<div class="mt">${c.ok?"✅ "+esc(c.good):"❌ "+esc(c.bad)}</div>`).join("")}

}

    <div class="card"><h3>Applications per week</h3><div class="bars" style="margin-bottom:24px">${weeks.map(w=>`<div class="bar" style="height:${100*w.count/maxW}%"><b>${w.count||""}</b><span>${w.label}</span></div>`).join("")}</div></div>
    <div class="card"><h3>Pipeline funnel</h3>${funnel.map(([l,n])=>`<div class="spread small"><span>${l}</span><b>${n}</b></div><div class="progress mb"><div style="width:${100*n/maxF}%"></div></div>`).join("")}</div>
    <div class="card"><h3>Readiness breakdown</h3>${Object.entries(rd.parts).map(([k,v])=>`<div class="spread small"><span>${k}</span><b>${v}</b></div><div class="progress mb"><div style="width:${v}%"></div></div>`).join("")}</div>
    <div class="card"><h3>Interview score trend</h3>${S.sessions.length?`<div class="bars" style="margin-bottom:24px">${S.sessions.slice(-10).map(s=>`<div class="bar" style="height:${s.score}%;background:${s.score>=70?"var(--accent2)":"var(--warn)"}"><b>${s.score}</b><span>${s.type.slice(0,4)}</span></div>`).join("")}</div>`:'<div class="muted small">Complete mock interviews to see your trend.</div>'}</div></div>`;
}
/* ============ SETTINGS ============ */
function viewSettings(){
  return `<div class="grid g2">
  <div class="card"><h3>Profile</h3>
    <label>Name</label><input value="${esc(S.settings.name)}" onchange="S.settings.name=this.value;save()">
    <label>Target role</label><select onchange="S.settings.targetRole=this.value;save();render()">${Object.keys(ROLE_SKILLS).map(r=>`<option ${S.settings.targetRole===r?"selected":""}>${r}</option>`).join("")}</select>
    <label>Target timeline (months)</label><input type="number" value="${S.settings.targetTimeline}" onchange="S.settings.targetTimeline=+this.value;save()">
    <label>Theme</label><div class="row"><button class="btn sm ${S.settings.theme==="dark"?"primary":""}" onclick="S.settings.theme='dark';save();applyTheme();render()">🌙 Dark</button><button class="btn sm ${S.settings.theme==="light"?"primary":""}" onclick="S.settings.theme='light';save();applyTheme();render()">☀️ Light</button></div></div>
  <div class="card"><h3>🤖 Automation workflows</h3>
    ${S.automations.map(a=>`<div class="checkitem"><input type="checkbox" ${a.on?"checked":""} onchange="S.automations.find(x=>x.id==='${a.id}').on=!${a.on};save()"><label><b>When ${esc(a.trigger.replace(/_/g," "))}</b> → ${esc(a.action)}</label></div>`).join("")}
    <div class="small muted mt">Automations fire automatically (e.g., completing a certification updates your resume skills and queues a LinkedIn post task).</div></div>
  <div class="card"><h3>Backup & recovery</h3>
    <div class="row"><button class="btn primary" onclick="download('careeros-backup-'+today()+'.json',JSON.stringify(S,null,2),'application/json');toast('Backup downloaded')">⬇ Export full backup (JSON)</button></div>
    <label>Restore from backup</label><input type="file" accept=".json" onchange="importBackup(this)">
    <div class="row mt"><button class="btn sm" onclick="exportJobsCSV()">Jobs CSV</button><button class="btn sm" onclick="exportContactsCSV()">Contacts CSV</button><button class="btn sm" onclick="if(S.resumes[0])exportResumePDF(S.resumes[0].id)">Resume PDF</button></div></div>
  <div class="card"><h3>Data</h3>
    <div class="small muted mb">All data lives in your browser's localStorage — nothing is sent to any server. Offline-first by design.</div>
    <div class="row"><button class="btn danger" onclick="resetDemo()">Reset to demo data</button>
    <button class="btn danger" onclick="resetEmpty()">Start fresh (empty)</button></div></div>
  <div class="card"><h3>About / platform notes</h3>
    <div class="small muted">This is the standalone web build of CareerOS. The production codebase (Next.js + PostgreSQL) adds: SSO via NextAuth, real GitHub OAuth, LLM-powered coach (Anthropic/OpenAI), push notifications, email digests, and role-based mentor access. Voice features use your browser's Web Speech API. Works offline after first load.</div></div>
  </div>`;
}
function importBackup(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const data=JSON.parse(r.result);if(!data.settings)throw new Error("bad file");S=Object.assign(defaultState(),data);save();applyTheme();render();toast("Backup restored ✓");}catch(e){toast("⚠️ Invalid backup file");}};
  r.readAsText(f);
}
/* ============ INIT ============ */
boot();
</script>
</body>
</html>
